<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product list with cart</title>

  <link rel="stylesheet" href="/css/styles.css"/>
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <div class="shop-container">
      <div class="dessert-list">
        <h1>Desserts</h1>
        <div class="desserts-grid"> 

        </div>
      </div>

      <div class="cart">
        <h2 class="cart-header">
          Your Cart (<span id="cart-quantity">3</span>)
        </h2>

        <div class="cart-item" data-id="1">
          <div class="cart-item-info">
            <h4 class="cart-item-title"> Classic Tiramisu</h4>
            <div class="cart-item-details">
              <p class="cart-item-quantity">
                <span data-key="item-quantity">1</span>x
              </p>
              <p class="cart-item-price"> 
                @ $ <span data-key="item-price">5.50</span>
              </p>
              <p class="cart-item-total">
                $ <span data-key="item-total-price">5.50</span>
              </p>
            </div>
          </div>
          <button class="cart-item-remove-btn" aria-label="Remove item">
            <svg width="10" height="10" fill="none" viewBox="0 0 10 10">
              <path fill="#CAAFA7" d="M8.375 9.375 5 6 1.625 9.375l-1-1L4 5 .625 1.625l1-1L5 4 8.375.625l1 1L6 5l3.375 3.375-1 1Z"/>
            </svg>

          </button>
        </div>

        <hr>

        <div class="cart-summary">
          <p>Order Total</p> <p class="cart-total">$<span id="cart-total"> 16.50</span></p>
        </div>
        <div class="cart-message--carbon-neutral">
          <img src="/assets/images/icon-carbon-neutral.svg" alt="Carbon neutral">
          <p>
            This is a <span style="font-weight: 600;">carbon neutral</span> delivery
          </p>
        </div>
        <button class="confirm-order-btn">Confirm Order</button>
      </div>
    </div>
  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Javnievic</a>.
  </div>
  <script src="/js/main.js"></script>
</body>
</html>
